<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cloud Prompt DB</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        /* 保留之前所有靚靚嘅 CSS 樣式 */
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; padding: 20px; max-width: 900px; margin: 0 auto; }
        .page-title-container { text-align: center; margin-bottom: 20px; }
        #page-title-text { font-size: 2em; font-weight: bold; cursor: pointer; color: #2c3e50; }
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        button { cursor: pointer; padding: 8px 12px; border: none; border-radius: 5px; background-color: #3498db; color: white; font-weight: bold; transition: 0.2s; }
        .btn-success { background-color: #2ecc71; }
        .btn-danger { background-color: #e74c3c; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background-color: #2ecc71; box-shadow: 0 0 5px #2ecc71; }
        
        /* 設定彈窗 (Setup Overlay) */
        #setup-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .setup-box { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 500px; }
        .setup-box h2 { margin-top: 0; color: #2c3e50; }
        .setup-box input { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        
        /* 卡片與分類樣式 (承襲 V3.0) */
        .category-box { border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 20px; overflow: hidden; background: white; }
        .category-header { display: flex; align-items: center; padding: 15px; cursor: pointer; font-weight: bold; user-select: none; }
        .category-body { display: none; padding: 15px; background: white; }
        .category-body.open { display: block; }
        .prompt-card { border-radius: 6px; margin-bottom: 8px; border: 1px solid rgba(0,0,0,0.05); }
        .card-header { padding: 12px; cursor: pointer; display: flex; align-items: center; }
        .card-body { display: none; padding: 15px; background: white; border-top: 1px solid #eee; }
        .card-body.open { display: block; }
        .title-text { flex-grow: 1; margin-left: 10px; }
        .edit-input { flex-grow: 1; padding: 5px; display: none; border: 2px dashed #3498db; }
        textarea { width: 100%; height: 120px; display: none; margin-top: 10px; border: 2px dashed #3498db; padding: 10px; box-sizing: border-box; }
        .content-display { white-space: pre-wrap; background: #f8f9fa; padding: 10px; border-radius: 5px; font-size: 0.9em; }
        .action-bar { margin-top: 10px; display: flex; gap: 8px; justify-content: flex-end; }
    </style>
</head>
<body>

    <div id="setup-overlay">
        <div class="setup-box">
            <h2>🔐 首次雲端設定</h2>
            <p style="font-size: 0.85em; color: #666;">請填入 Firebase Project Settings 中的資料：</p>
            <input type="text" id="conf-apiKey" placeholder="apiKey">
            <input type="text" id="conf-databaseURL" placeholder="databaseURL">
            <input type="text" id="conf-projectId" placeholder="projectId">
            <input type="password" id="conf-secretKey" placeholder="自訂私隱密碼 (隨便填一個，用嚟鎖住數據)">
            <button class="btn-success" style="width: 100%; margin-top: 15px;" onclick="saveConfig()">開始同步數據</button>
            <p style="font-size: 0.75em; color: #999; margin-top: 10px;">* 資料會儲存在此瀏覽器，只需輸入一次。</p>
        </div>
    </div>

    <div class="page-title-container">
        <span id="page-title-text" ondblclick="editPageTitle()">🧠 My Cloud Prompt DB</span>
        <div style="font-size: 0.8em; color: #7f8c8d; margin-top: 5px;">
            <span class="status-dot online"></span> 雲端同步中
        </div>
    </div>
    
    <div class="toolbar">
        <button class="btn-success" onclick="addCategory()">📁 新增 Topic</button>
        <div style="flex-grow: 1;"></div>
        <button style="background: #95a5a6;" onclick="clearConfig()">⚙️ 重設雲端</button>
    </div>

    <div id="database-container">
        <p style="text-align:center; color:#999; margin-top: 50px;">連線中，請稍候...</p>
    </div>

<script>
    let db;
    let database = [];
    let firebaseConfig = JSON.parse(localStorage.getItem('fb_config'));
    let secretPath = localStorage.getItem('fb_secret_path') || "default";
    const baseHues = [210, 150, 35, 350, 270, 180];

    // 1. 初始化檢查
    window.onload = function() {
        if (!firebaseConfig) {
            document.getElementById('setup-overlay').style.display = 'flex';
        } else {
            initFirebase();
        }
    };

    function saveConfig() {
        const config = {
            apiKey: document.getElementById('conf-apiKey').value,
            databaseURL: document.getElementById('conf-databaseURL').value,
            projectId: document.getElementById('conf-projectId').value,
            authDomain: `${document.getElementById('conf-projectId').value}.firebaseapp.com`,
            storageBucket: `${document.getElementById('conf-projectId').value}.appspot.com`,
        };
        const secret = document.getElementById('conf-secretKey').value || "my_secret_db";
        
        localStorage.setItem('fb_config', JSON.stringify(config));
        localStorage.setItem('fb_secret_path', secret);
        location.reload();
    }

    function clearConfig() {
        if(confirm("確定要重設雲端連線資料？")) {
            localStorage.removeItem('fb_config');
            localStorage.removeItem('fb_secret_path');
            location.reload();
        }
    }

    // 2. Firebase 連接
    function initFirebase() {
        firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        
        // 【核心】監聽雲端數據變化：一旦雲端有變，全裝置即時更新
        db.ref('users/' + secretPath).on('value', (snapshot) => {
            const data = snapshot.val();
            database = data ? data : [];
            render();
        });
    }

    function syncToCloud() {
        db.ref('users/' + secretPath).set(database);
    }

    // 3. 渲染與邏輯 (基於 V3.0 優化)
    function render() {
        const container = document.getElementById('database-container');
        container.innerHTML = '';
        if(database.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#999; margin-top: 50px;">目前仲係空白，撳左上角開始啦！</p>';
        }

        database.forEach((cat, catIndex) => {
            const hue = baseHues[catIndex % baseHues.length];
            const catDiv = document.createElement('div');
            catDiv.className = 'category-box';
            catDiv.style.borderLeft = `6px solid hsl(${hue}, 70%, 45%)`;
            
            let catHTML = `
                <div class="category-header" style="background: hsl(${hue}, 70%, 85%)" onclick="toggleElement('cat-body-${cat.id}')" ondblclick="editCategory(${cat.id})">
                    <span class="title-text" id="cat-text-${cat.id}">${cat.topic || '新分類 (Double Click 改名)'}</span>
                    <input type="text" class="edit-input" id="cat-input-${cat.id}" value="${cat.topic}" onblur="saveCategory(${cat.id})" onkeydown="if(event.key==='Enter') this.blur()">
                    <button class="btn-success" onclick="addPrompt(${cat.id}, event)" style="padding:4px 8px; font-size:12px;">➕</button>
                    <button class="btn-danger" onclick="deleteCategory(${cat.id}, event)" style="padding:4px 8px; font-size:12px; margin-left:5px;">🗑️</button>
                </div>
                <div class="category-body" id="cat-body-${cat.id}">
            `;

            cat.prompts?.forEach((p, pIndex) => {
                const lightness = Math.max(75, 95 - (pIndex * 4));
                catHTML += `
                    <div class="prompt-card">
                        <div class="card-header" style="background: hsl(${hue}, 60%, ${lightness}%)" onclick="toggleElement('p-body-${p.id}')" ondblclick="editPrompt(${cat.id}, ${p.id})">
                            <span class="title-text" id="p-text-${p.id}">${p.subheading || '新提示詞'}</span>
                            <input type="text" class="edit-input" id="p-input-${p.id}" value="${p.subheading}" onblur="savePromptTitle(${cat.id}, ${p.id})" onkeydown="if(event.key==='Enter') this.blur()">
                        </div>
                        <div class="card-body" id="p-body-${p.id}">
                            <div class="content-display" id="p-disp-${p.id}">${p.content || '(空白)'}</div>
                            <textarea id="p-area-${p.id}" onblur="savePromptContent(${cat.id}, ${p.id})">${p.content}</textarea>
                            <div class="action-bar">
                                <button onclick="copyText('${p.content.replace(/\n/g, '\\n')}')">📋 複製</button>
                                <button class="btn-danger" onclick="deletePrompt(${cat.id}, ${p.id})">🗑️ 刪除</button>
                            </div>
                        </div>
                    </div>
                `;
            });

            catHTML += `</div>`;
            catDiv.innerHTML = catHTML;
            container.appendChild(catDiv);
        });
    }

    // 操作函數 (全部加入 syncToCloud)
    function addCategory() {
        database.unshift({ id: Date.now(), topic: "", prompts: [] });
        syncToCloud();
    }
    function editCategory(id) {
        document.getElementById(`cat-text-${id}`).style.display = 'none';
        const input = document.getElementById(`cat-input-${id}`);
        input.style.display = 'block'; input.focus();
    }
    function saveCategory(id) {
        database.find(c => c.id === id).topic = document.getElementById(`cat-input-${id}`).value;
        syncToCloud();
    }
    function addPrompt(catId, e) {
        e.stopPropagation();
        database.find(c => c.id === catId).prompts.unshift({ id: Date.now(), subheading: "", content: "" });
        syncToCloud();
    }
    function editPrompt(catId, pId) {
        document.getElementById(`p-text-${pId}`).style.display = 'none';
        document.getElementById(`p-disp-${pId}`).style.display = 'none';
        document.getElementById(`p-input-${pId}`).style.display = 'block';
        document.getElementById(`p-area-${pId}`).style.display = 'block';
    }
    function savePromptTitle(catId, pId) {
        const cat = database.find(c => c.id === catId);
        cat.prompts.find(p => p.id === pId).subheading = document.getElementById(`p-input-${pId}`).value;
        syncToCloud();
    }
    function savePromptContent(catId, pId) {
        const cat = database.find(c => c.id === catId);
        cat.prompts.find(p => p.id === pId).content = document.getElementById(`p-area-${pId}`).value;
        syncToCloud();
    }
    function deleteCategory(id, e) {
        e.stopPropagation();
        if(confirm("刪除分類？")) { database = database.filter(c => c.id !== id); syncToCloud(); }
    }
    function deletePrompt(catId, pId) {
        const cat = database.find(c => c.id === catId);
        cat.prompts = cat.prompts.filter(p => p.id !== pId);
        syncToCloud();
    }
    function toggleElement(id) { document.getElementById(id).classList.toggle('open'); }
    function copyText(txt) { navigator.clipboard.writeText(txt); alert("已複製！"); }
</script>
</body>
</html>
